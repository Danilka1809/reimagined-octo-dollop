<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrifMC Pro | Техподдержка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* 3D ФОН */
        .background-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            perspective: 1000px;
        }

        .cube {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            transform-style: preserve-3d;
            transform: translate(-50%, -50%) rotateX(0deg) rotateY(0deg);
            animation: rotateCube 20s infinite linear;
        }

        @keyframes rotateCube {
            from { transform: translate(-50%, -50%) rotateX(0deg) rotateY(0deg); }
            to { transform: translate(-50%, -50%) rotateX(360deg) rotateY(360deg); }
        }

        .face {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 70, 0, 0.3);
            border: 2px solid #ff4400;
            box-shadow: 0 0 20px rgba(255, 68, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .front  { transform: translateZ(150px); background: rgba(255,68,0,0.2); }
        .back   { transform: rotateY(180deg) translateZ(150px); background: rgba(255,68,0,0.2); }
        .right  { transform: rotateY(90deg) translateZ(150px); background: rgba(255,68,0,0.2); }
        .left   { transform: rotateY(-90deg) translateZ(150px); background: rgba(255,68,0,0.2); }
        .top    { transform: rotateX(90deg) translateZ(150px); background: rgba(255,68,0,0.2); }
        .bottom { transform: rotateX(-90deg) translateZ(150px); background: rgba(255,68,0,0.2); }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .support-container {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            width: 500px;
            max-width: 90%;
            border: 1px solid #ff4400;
            box-shadow: 0 0 50px rgba(255, 68, 0, 0.3);
            z-index: 10;
        }

        h1 {
            text-align: center;
            color: #ff6600;
            text-shadow: 0 0 10px #ff3300;
            margin-bottom: 25px;
            font-size: 32px;
        }

        .toggle-theme {
            text-align: right;
            margin-bottom: 15px;
        }

        .theme-btn {
            background: #333;
            border: 1px solid #ff6600;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .theme-btn:hover {
            background: #ff6600;
        }

        .admin-lock {
            text-align: right;
            margin-bottom: 15px;
        }

        .lock-btn {
            background: #222;
            border: 1px solid #ff3300;
            color: #ff3300;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .status {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            background: #222;
            color: #ff6600;
        }

        .status.closed {
            background: #330000;
            color: #ff3300;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 1px solid #ff4400;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #ff4400, #ff6600);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 68, 0, 0.8);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .admin-panel {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ff4400;
            display: none;
        }
    </style>
</head>
<body>
    <div class="background-3d">
        <div class="cube">
            <div class="face front"></div>
            <div class="face back"></div>
            <div class="face right"></div>
            <div class="face left"></div>
            <div class="face top"></div>
            <div class="face bottom"></div>
        </div>
    </div>

    <div class="support-container" id="supportContainer">
        <div class="toggle-theme">
            <button class="theme-btn" onclick="toggleTheme()">🎨 Сменить тему</button>
        </div>
        
        <div class="admin-lock">
            <button class="lock-btn" id="lockBtn" onclick="toggleAdminLock()">🔒 Админ-панель</button>
        </div>

        <h1>🛡️ GrifMC Pro Support</h1>

        <div class="status" id="statusText">🔥 Служба поддержки активна</div>

        <form id="supportForm" action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="42864224-6df0-4e25-8068-7b486cf314dd">
            <input type="hidden" name="subject" value="GrifMC Pro | Обращение в поддержку">
            <input type="hidden" name="from_name" value="GrifMC Support">
            <input type="hidden" name="email" value="ramonenok@bk.ru">
            
            <input type="text" name="nickname" id="nickname" placeholder="Ваш никнейм" required>
            
            <select name="reason" id="reason">
                <option value="Бан">❌ Бан — разбан</option>
                <option value="Мут">🤐 Мут — размут</option>
                <option value="Варн">⚠️ Варн — обжалование</option>
                <option value="Другое">📝 Другое</option>
            </select>
            
            <textarea name="message" id="message" placeholder="Опишите проблему подробно..." required></textarea>
            
            <button type="submit" id="submitBtn">✉️ Отправить</button>
        </form>

        <div class="admin-panel" id="adminPanel">
            <input type="password" id="adminCode" placeholder="Код администратора">
            <button onclick="unlockSupport()">🔓 Разблокировать поддержку</button>
            <button onclick="closeSupport()">🔒 Закрыть поддержку</button>
        </div>
    </div>

    <script>
        let isSupportOpen = true;
        let currentTheme = 'dark';

        const form = document.getElementById('supportForm');
        const submitBtn = document.getElementById('submitBtn');
        const nickname = document.getElementById('nickname');
        const message = document.getElementById('message');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!isSupportOpen) {
                alert('🔒 Служба поддержки временно закрыта!');
                return;
            }

            if (!nickname.value || !message.value) {
                alert('❌ Заполните никнейм и сообщение!');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Отправка...';

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        access_key: '42864224-6df0-4e25-8068-7b486cf314dd',
                        nickname: nickname.value,
                        reason: document.getElementById('reason').value,
                        message: message.value,
                        email: 'ramonenok@bk.ru',
                        subject: 'GrifMC Pro | Обращение в поддержку'
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alert('✅ Сообщение отправлено! Администрация свяжется с вами.');
                    form.reset();
                } else {
                    alert('❌ Ошибка: ' + (result.message || 'Попробуйте позже'));
                }
            } catch (error) {
                alert('❌ Ошибка соединения. Проверьте интернет.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '✉️ Отправить';
            }
        });

        function toggleAdminLock() {
            const panel = document.getElementById('adminPanel');
            if (panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'block';
                document.getElementById('lockBtn').textContent = '🔓 Админ-панель';
            } else {
                panel.style.display = 'none';
                document.getElementById('lockBtn').textContent = '🔒 Админ-панель';
            }
        }

        function unlockSupport() {
            const code = document.getElementById('adminCode').value;
            if (code === 'grifmcpro111') {
                isSupportOpen = true;
                document.getElementById('statusText').innerHTML = '🔥 Служба поддержки активна';
                document.getElementById('statusText').className = 'status';
                submitBtn.disabled = false;
                alert('✅ Служба поддержки разблокирована!');
                document.getElementById('adminCode').value = '';
            } else {
                alert('❌ Неверный код доступа!');
            }
        }

        function closeSupport() {
            const code = document.getElementById('adminCode').value;
            if (code === 'grifmcpro111') {
                isSupportOpen = false;
                document.getElementById('statusText').innerHTML = '🔒 Служба поддержки временно закрыта';
                document.getElementById('statusText').className = 'status closed';
                submitBtn.disabled = true;
                alert('🔒 Служба поддержки закрыта!');
                document.getElementById('adminCode').value = '';
            } else {
                alert('❌ Неверный код доступа!');
            }
        }

        function toggleTheme() {
            const container = document.getElementById('supportContainer');
            if (currentTheme === 'dark') {
                container.style.background = 'rgba(255, 255, 255, 0.85)';
                container.style.borderColor = '#ff6600';
                currentTheme = 'light';
            } else {
                container.style.background = 'rgba(0, 0, 0, 0.8)';
                container.style.borderColor = '#ff4400';
                currentTheme = 'dark';
            }
        }
    </script>
</body>
</html>
