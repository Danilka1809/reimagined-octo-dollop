<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrifMC Pro — Новости</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      padding: 20px;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      justify-content: center;
    }
    .container { max-width: 600px; width: 100%; }
    @keyframes rgb {
      0% { color: #ff4d4d; } 25% { color: #ffd700; }
      50% { color: #4dff4d; } 75% { color: #4dd2ff; }
      100% { color: #ff4d4d; }
    }
    h1 {
      text-align: center;
      font-size: 32px;
      font-weight: 900;
      animation: rgb 3s infinite;
      margin-bottom: 25px;
    }
    .news-card {
      background: rgba(20, 20, 20, 0.9);
      border: 2px solid #2196F3;
      border-radius: 16px;
      padding: 20px 25px;
      margin-bottom: 15px;
    }
    .news-date { color: #2196F3; font-size: 13px; font-weight: bold; margin-bottom: 8px; }
    .news-title { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
    .news-text { color: #ccc; font-size: 14px; line-height: 1.7; }
    a { display: block; text-align: center; margin-top: 20px; color: #4CAF50; font-size: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📰 НОВОСТИ СЕРВЕРА</h1>
    
    <div class="news-card">
      <div class="news-date">📅 09.05.2026</div>
      <div class="news-title">🚀 Сайт запущен на GitHub!</div>
      <div class="news-text">Теперь все страницы работают для всех игроков. Следите за обновлениями!</div>
    </div>
    
    <div class="news-card">
      <div class="news-date">📅 Скоро</div>
      <div class="news-title">Готовим крупное обновление</div>
      <div class="news-text">Следите за новостями в нашем Telegram-канале @grifmcproservaternos</div>
    </div>

    <a href="index.html">← На главную</a>
  </div>
</body>
</html>
